server {
    listen 8080;
    server_name _;

    # H5 静态文件
    root /opt/relay/h5;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket 中继
    location /ws {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 播客生成 API (SSE)
    location = /api/podcast {
        proxy_pass http://127.0.0.1:9001/generate;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
    }

    # 播客列表
    location = /api/podcast/list {
        proxy_pass http://127.0.0.1:9001/list;
    }

    # 播客音频
    location /api/podcast/audio/ {
        proxy_pass http://127.0.0.1:9001/audio/;
    }

    # 健康检查
    location /health {
        return 200 '{"status":"ok","mode":"http","port":8080}';
        add_header Content-Type application/json;
    }
}
