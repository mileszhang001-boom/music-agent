server {
    listen 8443 ssl;
    server_name zhangchang.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/zhangchang.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhangchang.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # WebSocket 中继
    location /ws {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 播客 API: 生成 (SSE)
    location = /api/podcast {
        proxy_pass http://127.0.0.1:9001/generate;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
    }

    # 播客 API: 列表
    location = /api/podcast/list {
        proxy_pass http://127.0.0.1:9001/list;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 播客 API: 音频文件
    location /api/podcast/audio/ {
        proxy_pass http://127.0.0.1:9001/audio/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering on;
    }

    # 健康检查
    location /health {
        return 200 '{"status":"ok","service":"relay+podcast"}';
        add_header Content-Type application/json;
    }
}
